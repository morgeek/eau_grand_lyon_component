# Dashboard Lovelace avec contrôles de notifications
#
# À importer dans Home Assistant via Configuration > Tableaux de bord
# ou ajouter dans ui-lovelace.yaml

views:
  - title: "Eau du Grand Lyon"
    path: eau_grand_lyon
    icon: mdi:water
    badges: []
    cards:
      # ──────────────────────────────────────────────────────────────────────────
      # État général
      # ──────────────────────────────────────────────────────────────────────────

      - type: entities
        title: "État Général"
        show_header_toggle: false
        entities:
          - entity: sensor.eau_grand_lyon_health
          - entity: sensor.eau_grand_lyon_last_update
          - entity: sensor.eau_grand_lyon_alertes_actives

      # ──────────────────────────────────────────────────────────────────────────
      # Contrat principal
      # ──────────────────────────────────────────────────────────────────────────

      - type: entities
        title: "Contrat Principal"
        show_header_toggle: false
        entities:
          - entity: sensor.eau_grand_lyon_consommation_mois_courant
          - entity: sensor.eau_grand_lyon_consommation_mois_precedent
          - entity: sensor.eau_grand_lyon_consommation_annuelle
          - entity: sensor.eau_grand_lyon_cout_mois_courant
          - entity: sensor.eau_grand_lyon_cout_annuel
          - entity: sensor.eau_grand_lyon_solde
          - entity: sensor.eau_grand_lyon_statut
          - entity: sensor.eau_grand_lyon_date_echeance

      # ──────────────────────────────────────────────────────────────────────────
      # Consommations journalières (si disponible)
      # ──────────────────────────────────────────────────────────────────────────

      - type: conditional
        conditions:
          - entity: sensor.eau_grand_lyon_conso_7j
            state_not: "unavailable"
        card:
          type: entities
          title: "Consommations Journalières"
          show_header_toggle: false
          entities:
            - entity: sensor.eau_grand_lyon_conso_7j
            - entity: sensor.eau_grand_lyon_conso_30j

      # ──────────────────────────────────────────────────────────────────────────
      # Graphique historique
      # ──────────────────────────────────────────────────────────────────────────

      - type: history-graph
        title: "Historique de Consommation"
        hours_to_show: 720  # 30 jours
        entities:
          - entity: sensor.eau_grand_lyon_consommation_mois_courant
            name: "Mois courant"
          - entity: sensor.eau_grand_lyon_consommation_mois_precedent
            name: "Mois précédent"

      # ──────────────────────────────────────────────────────────────────────────
      # Contrôles de notifications (test/debug)
      # ──────────────────────────────────────────────────────────────────────────

      - type: entities
        title: "Test des Notifications"
        show_header_toggle: false
        entities:
          - type: button
            name: "Test Pushover"
            icon: mdi:message-badge
            tap_action:
              action: call-service
              service: eau_grand_lyon.notify_pushover
              service_data:
                message: "Test de notification Pushover depuis le dashboard"
                title: "Test Eau Grand Lyon"
                priority: 0

          - type: button
            name: "Test Telegram"
            icon: mdi:telegram
            tap_action:
              action: call-service
              service: eau_grand_lyon.notify_telegram
              service_data:
                message: "Test de notification Telegram depuis le dashboard"
                priority: 0

          - type: button
            name: "Test Alerte Vocale"
            icon: mdi:account-voice
            tap_action:
              action: call-service
              service: eau_grand_lyon.alert_voice
              service_data:
                message: "Ceci est un test d'alerte vocale"
                language: fr
                volume_level: 0.6

          - type: button
            name: "Test Alerte Intelligente"
            icon: mdi:brain
            tap_action:
              action: call-service
              service: eau_grand_lyon.smart_alert
              service_data:
                alert_type: high_consumption

      # ──────────────────────────────────────────────────────────────────────────
      # Boutons d'action
      # ──────────────────────────────────────────────────────────────────────────

      - type: horizontal-stack
        cards:
          - type: button
            name: "Rafraîchir"
            icon: mdi:refresh
            tap_action:
              action: call-service
              service: eau_grand_lyon.update_data

          - type: button
            name: "Configuration"
            icon: mdi:cog
            tap_action:
              action: navigate
              navigation_path: /config/integrations/integration/eau_grand_lyon