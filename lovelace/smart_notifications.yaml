# Automatisations pour notifications intelligentes Eau du Grand Lyon
#
# À importer dans Home Assistant via Configuration > Automatisations
# ou ajouter dans automations.yaml

# ──────────────────────────────────────────────────────────────────────────────
# Alerte consommation élevée
# ──────────────────────────────────────────────────────────────────────────────

- id: eau_grand_lyon_high_consumption_alert
  alias: "Eau Grand Lyon - Alerte consommation élevée"
  description: "Détecte une consommation anormalement élevée"
  trigger:
    - platform: numeric_state
      entity_id: sensor.eau_grand_lyon_consommation_mois_courant
      above: sensor.eau_grand_lyon_consommation_mois_precedent
      for:
        minutes: 5
      value_template: "{{ (states(entity_id) | float) > (states.second_entity | float * 1.5) }}"
  condition:
    - condition: template
      value_template: "{{ (states('sensor.eau_grand_lyon_consommation_mois_courant') | float) > (states('sensor.eau_grand_lyon_consommation_mois_precedent') | float * 1.5) }}"
  action:
    - service: eau_grand_lyon.smart_alert
      data:
        alert_type: high_consumption
    - delay: 3600  # Éviter les spam (1 alerte/heure max)
  mode: single

# ──────────────────────────────────────────────────────────────────────────────
# Alerte possible fuite (consommation journalière)
# ──────────────────────────────────────────────────────────────────────────────

- id: eau_grand_lyon_leak_alert
  alias: "Eau Grand Lyon - Alerte possible fuite"
  description: "Détecte une consommation journalière anormalement élevée"
  trigger:
    - platform: time
      at: "08:00:00"  # Vérification quotidienne le matin
  condition:
    - condition: template
      value_template: >
        {% set conso_7j = states('sensor.eau_grand_lyon_conso_7j') | float(0) %}
        {% set conso_30j = states('sensor.eau_grand_lyon_conso_30j') | float(0) %}
        {{ conso_7j > 0 and conso_30j > 0 and conso_7j > (conso_30j / 4 * 2) }}
  action:
    - service: eau_grand_lyon.smart_alert
      data:
        alert_type: leak_detected
  mode: single

# ──────────────────────────────────────────────────────────────────────────────
# Rappel paiement en retard
# ──────────────────────────────────────────────────────────────────────────────

- id: eau_grand_lyon_payment_reminder
  alias: "Eau Grand Lyon - Rappel paiement"
  description: "Rappelle les paiements en retard"
  trigger:
    - platform: time
      at: "09:00:00"
  condition:
    - condition: template
      value_template: >
        {% set solde = states('sensor.eau_grand_lyon_solde') | float(0) %}
        {% set date_echeance = states('sensor.eau_grand_lyon_date_echeance') %}
        {{ solde < -10 and date_echeance != 'unknown' and date_echeance != 'unavailable' }}
  action:
    - service: eau_grand_lyon.smart_alert
      data:
        alert_type: payment_due
  mode: single

# ──────────────────────────────────────────────────────────────────────────────
# Alerte problème de contrat
# ──────────────────────────────────────────────────────────────────────────────

- id: eau_grand_lyon_contract_issue_alert
  alias: "Eau Grand Lyon - Problème de contrat"
  description: "Détecte les problèmes de statut contrat"
  trigger:
    - platform: state
      entity_id: sensor.eau_grand_lyon_statut
      to: "Suspendu"
      for:
        minutes: 5
  action:
    - service: eau_grand_lyon.smart_alert
      data:
        alert_type: contract_issue
  mode: single

# ──────────────────────────────────────────────────────────────────────────────
# Notification quotidienne de résumé
# ──────────────────────────────────────────────────────────────────────────────

- id: eau_grand_lyon_daily_summary
  alias: "Eau Grand Lyon - Résumé quotidien"
  description: "Envoie un résumé quotidien de la consommation"
  trigger:
    - platform: time
      at: "20:00:00"  # 20h00 tous les jours
  condition:
    - condition: state
      entity_id: sensor.eau_grand_lyon_health
      state: "OK"
  action:
    - service: eau_grand_lyon.notify_telegram
      data:
        message: >
          📊 Résumé quotidien Eau du Grand Lyon

          🔹 Consommation mois courant: {{ states('sensor.eau_grand_lyon_consommation_mois_courant') }} m³
          🔹 Coût estimé: {{ states('sensor.eau_grand_lyon_cout_mois_courant') }} €
          🔹 Solde: {{ states('sensor.eau_grand_lyon_solde') }} €
          🔹 Statut: {{ states('sensor.eau_grand_lyon_statut') }}

          {% if states('sensor.eau_grand_lyon_conso_7j') != 'unavailable' %}
          🔹 7 derniers jours: {{ states('sensor.eau_grand_lyon_conso_7j') }} m³
          {% endif %}
        title: "Résumé Eau Grand Lyon"
        priority: -1  # Notification silencieuse
  mode: single

# ──────────────────────────────────────────────────────────────────────────────
# Alerte maintenance recommandée
# ──────────────────────────────────────────────────────────────────────────────

- id: eau_grand_lyon_maintenance_alert
  alias: "Eau Grand Lyon - Maintenance recommandée"
  description: "Suggère une maintenance basée sur la consommation annuelle"
  trigger:
    - platform: time
      at: "10:00:00"
      # Tous les premiers du mois
  condition:
    - condition: template
      value_template: >
        {% set conso_annuelle = states('sensor.eau_grand_lyon_consommation_annuelle') | float(0) %}
        {% set jour = now().day %}
        {{ jour == 1 and conso_annuelle > 2000 }}
  action:
    - service: eau_grand_lyon.smart_alert
      data:
        alert_type: maintenance_needed
  mode: single

# ──────────────────────────────────────────────────────────────────────────────
# Alerte vocale d'urgence (fuite détectée)
# ──────────────────────────────────────────────────────────────────────────────

- id: eau_grand_lyon_emergency_voice_alert
  alias: "Eau Grand Lyon - Alerte vocale urgence"
  description: "Alerte vocale pour les situations d'urgence"
  trigger:
    - platform: event
      event_type: eau_grand_lyon_leak_detected
  action:
    - service: eau_grand_lyon.alert_voice
      data:
        message: "Alerte importante ! Une possible fuite d'eau a été détectée. Vérifiez immédiatement vos installations sanitaires."
        language: fr
        volume_level: 0.8
  mode: single