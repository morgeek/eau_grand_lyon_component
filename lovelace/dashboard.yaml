# ═══════════════════════════════════════════════════════════════════
#  Dashboard "Eau du Grand Lyon" — Lovelace YAML (Version PRO 2.3.0)
# ═══════════════════════════════════════════════════════════════════
#
#  Ce dashboard regroupe toutes les fonctions d'intelligence, d'écologie
#  et de sécurité de la version 2.3.0.
#
#  Conseil : Remplacez les entités par vos noms d'entités réels si vous
#  avez renommé l'intégration lors de l'installation.
# ═══════════════════════════════════════════════════════════════════

title: 💧 Eau du Grand Lyon PRO
views:
  - title: Synthèse
    icon: mdi:water
    cards:

      # ── RÉSUMÉ FINANCIER & CONSO ──────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: sensor
            entity: sensor.eau_du_grand_lyon_consommation_mois_courant
            name: Ce mois
            graph: line
          - type: sensor
            entity: sensor.eau_du_grand_lyon_cout_estime_mois_courant
            name: Coût estimé
            graph: line

      # ── INTELLIGENCE & PRÉDICTIONS ────────────────────────────────
      - type: entities
        title: 🧠 Intelligence & Prédictions
        show_header_toggle: false
        entities:
          - entity: sensor.eau_du_grand_lyon_tendance_vs_n_1
            name: Tendance vs N-1
          - entity: sensor.eau_du_grand_lyon_prediction_consommation_fin_de_mois
            name: Prédiction volume (m³)
          - entity: sensor.eau_du_grand_lyon_prediction_cout_fin_de_mois
            name: Prédiction coût (€)
          - type: divider
          - entity: sensor.eau_du_grand_lyon_eco_score
            name: Eco-Score (Performance)
          - entity: sensor.eau_du_grand_lyon_empreinte_carbone
            name: Impact CO2 (kg CO2e)

      # ── SÉCURITÉ & RESTRICTIONS ──────────────────────────────────
      - type: vertical-stack
        cards:
          - type: grid
            columns: 2
            square: false
            cards:
              - type: entity
                entity: sensor.eau_du_grand_lyon_restrictions_secheresse_69
                name: Sécheresse (69)
              - type: entity
                entity: switch.eau_du_grand_lyon_mode_vacances
                name: Mode Vacances
          
          - type: conditional
            conditions:
              - entity: switch.eau_du_grand_lyon_mode_vacances
                state: "on"
            card:
              type: markdown
              content: >
                ### 🛡️ Surveillance Vacances Active
                Toute consommation > 1L déclenchera une alerte critique.

      # ── ALERTES FUITES ───────────────────────────────────────────
      - type: entities
        title: ⚠️ Détection de fuites
        show_header_toggle: false
        entities:
          - entity: binary_sensor.eau_du_grand_lyon_detection_fuite_teleo
            name: Fuite officielle (Téléo)
          - entity: binary_sensor.eau_du_grand_lyon_detection_fuite_locale
            name: Analyse locale (Pattern)

      # ── DIAGNOSTICS & HARDWARE ───────────────────────────────────
      - type: entities
        title: 🔧 Santé du matériel
        show_header_toggle: false
        entities:
          - entity: sensor.eau_du_grand_lyon_signal_module_teleo
            name: Signal radio module
          - entity: binary_sensor.eau_du_grand_lyon_batterie_module_teleo
            name: État de la pile module
          - entity: sensor.eau_du_grand_lyon_statut_api
            name: Connectivité API

      # ── ÉCHÉANCES & CALENDRIER ───────────────────────────────────
      - type: calendar
        entities:
          - calendar.eau_du_grand_lyon_echeances_facturation
        initial_view: list

      # ── GRAPH HISTORIQUE ─────────────────────────────────────────
      - type: statistics-graph
        title: Historique 24 mois
        entities:
          - entity: sensor.eau_du_grand_lyon_index_cumulatif
        stat_types:
          - change
        period: month
        chart_type: bar
        days_to_show: 730

  - title: Multi-Contrats
    icon: mdi:layers-triple
    cards:
      # ── TOTAUX GLOBAUX (Multi-Contrats) ───────────────────────────
      - type: entities
        title: 🌍 Totaux du compte (Agrégation)
        entities:
          - entity: sensor.eau_du_grand_lyon_total_consommation_compte
            name: Conso totale (m³)
          - entity: sensor.eau_du_grand_lyon_total_cout_compte
            name: Coût total (€)
          - entity: sensor.eau_du_grand_lyon_total_prediction_cout_compte
            name: Budget total prévu (€)
