# Configuration des services de notifications pour Eau du Grand Lyon
#
# À ajouter dans configuration.yaml
# Adapté selon vos services de notification configurés

# ──────────────────────────────────────────────────────────────────────────────
# Pushover (https://pushover.net/)
# ──────────────────────────────────────────────────────────────────────────────

notify:
  - name: pushover
    platform: pushover
    api_key: "YOUR_PUSHOVER_API_KEY"
    user_key: "YOUR_PUSHOVER_USER_KEY"

# ──────────────────────────────────────────────────────────────────────────────
# Telegram Bot (https://telegram.org/)
# ──────────────────────────────────────────────────────────────────────────────

notify:
  - name: telegram
    platform: telegram_bot
    api_key: "YOUR_TELEGRAM_BOT_TOKEN"
    chat_id: "YOUR_TELEGRAM_CHAT_ID"

# ──────────────────────────────────────────────────────────────────────────────
# Google Home / Chromecast (pour alertes vocales)
# ──────────────────────────────────────────────────────────────────────────────

tts:
  - platform: google_translate
    language: fr
    tld: fr

# ──────────────────────────────────────────────────────────────────────────────
# Alexa (si vous avez l'intégration Alexa Media Player)
# ──────────────────────────────────────────────────────────────────────────────

# Note: Configurez l'intégration Alexa Media Player séparément
# Les services TTS Amazon Polly seront automatiquement détectés

# ──────────────────────────────────────────────────────────────────────────────
# Configuration recommandée pour les alertes vocales
# ──────────────────────────────────────────────────────────────────────────────

# Si vous voulez limiter les alertes vocales à certains devices :
# entity_id: media_player.google_home_salon,media_player.echo_dot_chambre

# Volume recommandé pour les alertes : 0.6-0.8
# Langue recommandée : fr (français)

# ──────────────────────────────────────────────────────────────────────────────
# Test des services
# ──────────────────────────────────────────────────────────────────────────────

# Test Pushover :
# service: eau_grand_lyon.notify_pushover
# data:
#   message: "Test notification Pushover"
#   title: "Test Eau Grand Lyon"

# Test Telegram :
# service: eau_grand_lyon.notify_telegram
# data:
#   message: "Test notification Telegram"

# Test alerte vocale :
# service: eau_grand_lyon.alert_voice
# data:
#   message: "Ceci est un test d'alerte vocale"
#   volume_level: 0.7

# Test alerte intelligente :
# service: eau_grand_lyon.smart_alert
# data:
#   alert_type: high_consumption