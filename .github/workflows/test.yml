name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov async-lru aiohttp voluptuous

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 custom_components/eau_grand_lyon/ --max-line-length=120 --extend-ignore=E203,W503 --count --show-source
        continue-on-error: true

      - name: Format check with black
        run: |
          pip install black
          black --check custom_components/eau_grand_lyon/ --line-length=120
        continue-on-error: true

      - name: Run tests
        run: |
          pytest tests/ -v --cov=custom_components/eau_grand_lyon/ --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
